<div class="dashboard-grid">
    <div class="data-card">
        <span class="data-label">Influent Turbidity</span>
        <span class="data-val" id="d1">88.1</span><small>NTU</small>
    </div>
    
    <div class="data-card" style="border-color: #f1c40f;">
        <span class="data-label">Solid-Liquid Separation Efficiency</span>
        <span class="data-val" id="separationEff" style="color: #f1c40f;">99.95</span><small>%</small>
    </div>

    <div class="data-card" style="border-color: var(--mbbr-green);">
        <span class="data-label">Effluent Quality</span>
        <span class="data-val" id="d2" style="color:var(--mbbr-green)">0.69</span><small>NTU</small>
    </div>
    <div class="data-card">
        <span class="data-label">Invila™ DECM Stability</span>
        <span class="data-val">99.2</span><small>% Stability</small>
    </div>
</div>

<script>
    // Logika Sensor Fluktuatif Spesifik (99.88% - 99.99%)
    function updateSensors() {
        // Influent NTU
        document.getElementById('d1').innerText = (85 + Math.random() * 5).toFixed(1);
        
        // Effluent NTU 
        document.getElementById('d2').innerText = (0.6 + Math.random() * 0.2).toFixed(2);
        
        // FLUKTUASI EFISIENSI PEMISAHAN (99.88 - 99.99)
        const minEff = 99.88;
        const maxEff = 99.99;
        const currentEff = (Math.random() * (maxEff - minEff) + minEff).toFixed(2);
        document.getElementById('separationEff').innerText = currentEff;
    }

    // Jalankan update setiap 2 detik agar terlihat live
    setInterval(updateSensors, 2000);
    
    // Fungsi animasi partikel dan crystal clear tetap berjalan di latar belakang
    window.onload = runSimulationLoop; 
</script>
