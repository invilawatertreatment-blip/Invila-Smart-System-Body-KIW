<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INVILA™ SMART SYSTEM | SEAMLESS DIGITAL TWIN HMI</title>
    
    <style>
        :root {
            --bg-dark: #070b14;
            --panel-bg: #0f172a;
            --invila-cyan: #00f2ff;
            --mbbr-green: #2ecc71;
            --dirty-mud: #3d2b1f; /* Lumpur pekat */
            --text-slate: #94a3b8;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .hmi-wrapper {
            width: 100%;
            max-width: 1300px;
            background: var(--panel-bg);
            border: 2px solid #1e293b;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 60px rgba(0,0,0,0.8);
        }

        /* HEADER STATUS */
        .hmi-header { text-align: center; margin-bottom: 25px; }
        #status-text { font-size: 1.2rem; font-weight: bold; transition: color 0.3s; }

        /* AREA VISUALISASI UTAMA */
        .visualizer-area {
            position: relative;
            width: 100%;
            height: 550px;
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            border: 1px solid #334155;
            overflow: hidden;
            margin-bottom: 30px;
        }

        /* BACKGROUND UNIT (65% SCALE) */
        .unit-background {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 65%; 
            height: auto;
            opacity: 0.85;
            z-index: 1;
            content: url('invila-unit-technical.png'); 
        }

        /* ANIMASI PARTIKEL KONSISTEN KIRI-KE-KANAN */
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--dirty-mud);
            border-radius: 50%;
            z-index: 3;
            opacity: 0;
        }

        @keyframes swirlAndSettle {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0.9; }
            40% { transform: translate(70px, -20px) rotate(180deg); opacity: 0.9; }
            70% { transform: translate(130px, 120px); opacity: 0.6; }
            100% { transform: translate(160px, 220px); opacity: 0; }
        }

        /* EFEK AIR CRYSTAL CLEAR (TUMBUH KE KANAN) */
        .crystal-clear-layer {
            position: absolute;
            top: 30%;
            left: 45%; 
            width: 0;
            height: 40%;
            background: linear-gradient(to right, transparent, rgba(0, 242, 255, 0.5));
            z-index: 2;
            transition: width 1.2s ease-in-out;
            border-radius: 0 50px 50px 0;
        }

        .pipe-flow { position: absolute; height: 12px; border-radius: 6px; z-index: 5; transition: width 0.7s ease; }
        
        /* Inflow Tumbuh ke Kanan */
        .inflow { top: 20%; left: 8%; background: var(--dirty-mud); box-shadow: 0 0 10px var(--dirty-mud); }
        
        /* Outflow Tumbuh ke Kanan */
        .outflow { bottom: 22%; left: 81%; background: var(--invila-cyan); box-shadow: 0 0 20px var(--invila-cyan); }

        /* DASHBOARD DATA (HURUF SANGAT BESAR) */
        .dashboard-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .data-card {
            background: #070b14;
            padding: 25px 15px;
            border-radius: 12px;
            border-left: 6px solid var(--invila-cyan);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 160px;
        }

        .data-label { font-size: 0.8rem; color: var(--text-slate); text-transform: uppercase; font-weight: bold; margin-bottom: 8px; line-height: 1.2; }
        .data-val { font-size: 3rem; font-weight: 900; display: block; }
        .u-metric { font-size: 1rem; color: var(--text-slate); font-weight: bold; }
        .decm-info { color: #f1c40f; font-size: 0.85rem; margin-top: 8px; font-weight: bold; }

        .guarantee-box {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            border: 2px dashed var(--invila-cyan);
            color: var(--invila-cyan);
            font-weight: bold;
            border-radius: 10px;
            font-size: 1.3rem;
        }
    </style>
</head>
<body>

<div class="hmi-wrapper">
    <header class="hmi-header">
        <h1 style="color:var(--invila-cyan); margin:0; letter-spacing: 2px; font-size: 2.2rem;">INVILA™ SMART SYSTEM | LIVE SIMULATION</h1>
        <span id="status-text" style="color:var(--mbbr-green);">● STATUS: ACTIVE</span>
    </header>

    <div class="visualizer-area">
        <img class="unit-background" src="invila-unit-technical.png">
        <div id="settleZone" class="crystal-clear-layer"></div>
        <div id="particleField"></div>
        <div id="pipeIn" class="pipe-flow inflow" style="width: 0;"></div>
        <div id="pipeOut" class="pipe-flow outflow" style="width: 0;"></div>
    </div>

    <div class="dashboard-grid">
        <div class="data-card">
            <span class="data-label">Influent Turbidity</span>
            <span class="data-val" id="val-influent">88.1</span>
            <span class="u-metric">NTU</span>
        </div>

        <div class="data-card" style="border-color: #f1c40f;">
            <span class="data-label">Solid-Liquid Separation Efficiency</span>
            <span class="data-val" id="val-efficiency" style="color: #f1c40f;">99.95</span>
            <span class="u-metric">% Accuracy</span>
            <div class="decm-info">DECM Re No: <span id="val-reynolds">350</span></div>
        </div>

        <div class="data-card" style="border-color: var(--mbbr-green);">
            <span class="data-label">Effluent Quality</span>
            <span class="data-val" id="val-effluent" style="color:var(--mbbr-green)">0.69</span>
            <span class="u-metric">NTU</span>
        </div>

        <div class="data-card">
            <span class="data-label">High Speed GSF Efisiensi</span>
            <span class="data-val" id="val-gsf">99.85</span>
            <span class="u-metric">Range 99.0% - 99.99%</span>
        </div>
    </div>

    <div class="guarantee-box">"No-Result, No-Pay. Performa air adalah jaminan kami."</div>
</div>

<script>
    function runSimulationLoop() {
        const pField = document.getElementById('particleField');
        const clearWater = document.getElementById('settleZone');
        const pipeIn = document.getElementById('pipeIn');
        const pipeOut = document.getElementById('pipeOut');
        const statusText = document.getElementById('status-text');

        pipeIn.style.width = '0%';
        pipeOut.style.width = '0%';
        clearWater.style.width = '0%';
        pField.innerHTML = '';
        
        setTimeout(() => { 
            pipeIn.style.width = '14%'; 
            statusText.innerText = "● STATUS: FLOWING INFLUENT";
            statusText.style.color = "#d35400";
        }, 100);

        setTimeout(() => {
            statusText.innerText = "● STATUS: SEPARATING SOLIDS";
            statusText.style.color = "white";
            for (let i = 0; i < 120; i++) {
                setTimeout(() => {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    p.style.left = (25 + Math.random() * 15) + '%';
                    p.style.top = (32 + Math.random() * 20) + '%';
                    p.style.animation = `swirlAndSettle ${1.2 + Math.random() * 0.8}s forwards linear`;
                    pField.appendChild(p);
                }, i * 12);
            }
        }, 400);

        setTimeout(() => {
            clearWater.style.width = '38%';
        }, 2200);

        setTimeout(() => {
            statusText.innerText = "● STATUS: RECLAMATION ACTIVE";
            statusText.style.color = "var(--mbbr-green)";
            pipeOut.style.width = '14%';
        }, 3200);

        setTimeout(runSimulationLoop, 5500);
    }

    function updateLiveSensors() {
        // Update NTUs
        document.getElementById('val-influent').innerText = (88 + Math.random() * 4).toFixed(1);
        document.getElementById('val-effluent').innerText = (0.4 + Math.random() * 0.3).toFixed(2);
        
        // Update Efficiency
        const currentEff = (99.88 + Math.random() * 0.11).toFixed(2);
        document.getElementById('val-efficiency').innerText = currentEff;

        // Update DECM Re No (250 - 450)
        const currentRe = Math.floor(Math.random() * (450 - 250 + 1)) + 250;
        document.getElementById('val-reynolds').innerText = currentRe;

        // Update High Speed GSF (99.0 - 99.99)
        const currentGsf = (99.00 + Math.random() * 0.99).toFixed(2);
        document.getElementById('val-gsf').innerText = currentGsf;
    }

    setInterval(updateLiveSensors, 1500);
    window.onload = runSimulationLoop;
</script>

</body>
</html>
