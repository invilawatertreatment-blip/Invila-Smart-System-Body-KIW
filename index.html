<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>INVILA™ SMART SYSTEM | DIGITAL TWIN HMI</title>
    
    <style>
        :root {
            --bg-dark: #070b14;
            --panel-bg: #0f172a;
            --invila-cyan: #00f2ff;
            --mbbr-green: #2ecc71;
            --danger-red: #ff4d4d;
            --dirty-brown: #5d4e40;
            --clean-blue: #2ecc71;
            --text-grey: #94a3b8;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', 'Consolas', monospace; /* Gaya Industrial SCADA */
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .hmi-wrapper {
            width: 100%;
            max-width: 1400px;
            background: var(--panel-bg);
            border: 2px solid #1e293b;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* HEADER SECTION */
        .hmi-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #1e293b;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .hmi-header h1 { font-size: 1.6rem; margin: 0; letter-spacing: 2px; color: var(--invila-cyan); }
        .system-status { font-size: 0.75rem; color: var(--mbbr-green); font-weight: bold; }

        /* VISUALISASI UTAMA (UNIT FISIK) */
        .visualizer-area {
            position: relative;
            width: 100%;
            height: 600px;
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            border: 1px solid #334155;
            overflow: hidden;
            margin-bottom: 30px;
        }

        /* GAMBAR TEKNIS SEBAGAI LATAR */
        .unit-background {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; /* Sesuaikan skala */
            height: auto;
            opacity: 0.8;
            z-index: 1;
            /* Sinkron dengan nama file di GitHub Anda */
            content: url('invila-unit-technical.png'); 
        }

        /* ANIMASI ALIRAN AIR (OVERLAY) */
        .water-flow {
            position: absolute;
            height: 12px;
            border-radius: 5px;
            z-index: 5;
            transition: width 2s ease, transform 2s ease;
        }

        /* Influent (Masuk - Flange Atas Kiri) */
        .flow-in {
            top: 25%; /* Sesuaikan posisi flange atas pada gambar */
            left: 10%; /* Sesuaikan posisi flange atas pada gambar */
            width: 0%; /* Di-update via JS */
            background: var(--dirty-brown);
            box-shadow: 0 0 15px var(--dirty-brown);
        }

        /* === PERBAIKAN: EFFLUENT KELUAR KE KANAN (Correct Direction) === */
        .flow-out {
            bottom: 25%; /* Sesuaikan posisi flange bawah pada gambar */
            right: 10%; /* Mulai dari flange unit */
            width: 0%; /* Di-update via JS */
            background: var(--invila-cyan);
            box-shadow: 0 0 20px var(--invila-cyan);
            
            /* Gunakan transformasi agar arah 'tumbuh' ke kanan */
            transform-origin: left center; 
        }

        /* IOT DATA OVERLAY (Menempel pada Unit) */
        .iot-data-tag {
            position: absolute;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid var(--invila-cyan);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            z-index: 10;
        }
        .val-big { display: block; font-size: 1.3rem; font-weight: 900; color: white; }
    </style>
</head>
<body>

<div class="hmi-wrapper">
    <header class="hmi-header">
        <h1 style="color:var(--invila-cyan); margin:0;">INVILA™ SMART SYSTEM | DIGITAL TWIN HMI</h1>
        <p style="color:var(--text-grey); font-size:0.8rem; margin:5px 0 0 0;">INTEGRATED RETROFIT RECLAMATION (Corrected Flow)</p>
    </header>

    <div class="visualizer-container">
        <img class="technical-image" alt="Invila Technical Drawing">

        <div class="water-flow flow-in" id="flowIn"></div>
        <div class="water-flow flow-out" id="flowOut"></div>

        <div class="iot-data-tag" style="top: 20%; left: 5%;">
            INFLUENT QUALITY
            <span class="val-big" id="v1">85.40</span> NTU
        </div>

        <div class="iot-data-tag" style="top: 50%; left: 50%; transform: translate(-50%, -50%); border-color: var(--mbbr-green);">
            DECM STABILITY
            <span class="val-big" id="v2" style="color:var(--mbbr-green)">99.20</span> %
        </div>

        <div class="iot-data-tag" style="bottom: 20%; right: 5%;">
            EFFLUENT QUALITY
            <span class="val-big" id="v3" style="color:var(--invila-cyan)">0.85</span> NTU
        </div>
    </div>
</div>

<script>
    function updateIOTSimulation() {
        const flowIn = document.getElementById('flowIn');
        const flowOut = document.getElementById('flowOut');

        // Aliran Masuk (Dirty - Ke Kanan)
        flowIn.style.width = '25%'; // Tumbuh ke kanan menuju tangki
        
        // Aliran Keluar (Clean - Ke Kanan) - Muncul setelah jeda proses
        setTimeout(() => {
            // Tumbuh ke kanan menjauhi tangki
            flowOut.style.width = '25%'; 
        }, 3000);

        // Update Data Sensor
        document.getElementById('v1').innerText = (80 + Math.random() * 10).toFixed(2);
        document.getElementById('v2').innerText = (98 + Math.random() * 1.5).toFixed(2);
        document.getElementById('v3').innerText = (0.5 + Math.random() * 0.5).toFixed(2);
    }

    window.onload = () => {
        updateIOTSimulation();
        setInterval(updateIOTSimulation, 3000); // Update data setiap 3 detik
    }
</script>

</body>
</html>
