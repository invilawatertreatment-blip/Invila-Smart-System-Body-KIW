<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>INVILA™ SMART SYSTEM | Digital Twin HMI</title>
    <style>
        :root {
            --bg-dark: #070b14;
            --panel-bg: #0f172a;
            --invila-cyan: #00f2ff;
            --mbbr-green: #2ecc71;
            --dirty-brown: #5d4e40;
            --text-slate: #94a3b8;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .hmi-wrapper {
            width: 100%;
            max-width: 1300px;
            background: var(--panel-bg);
            border: 2px solid #1e293b;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 60px rgba(0,0,0,0.8);
        }

        /* AREA VISUALISASI UTAMA */
        .visualizer-area {
            position: relative;
            width: 100%;
            height: 550px;
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            border: 1px solid #334155;
            overflow: hidden;
            margin-bottom: 30px;
        }

        /* BACKGROUND UNIT TEKNIS (65%) */
        .unit-background {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 65%; 
            height: auto;
            opacity: 0.8;
            z-index: 1;
            /* Sinkron dengan file di GitHub Anda */
            content: url('invila-unit-technical.png'); 
        }

        /* ANIMASI PARTIKEL (SIMULASI PENGENDAPAN) */
        .particle {
            position: absolute;
            width: 5px;
            height: 5px;
            background: var(--dirty-brown);
            border-radius: 50%;
            z-index: 3;
            opacity: 0;
        }

        @keyframes swirlAndSettle {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0.8; }
            30% { transform: translate(60px, -30px) rotate(180deg); opacity: 0.8; }
            60% { transform: translate(100px, 100px); opacity: 0.6; } /* Mengendap */
            100% { transform: translate(120px, 200px); opacity: 0; } /* Hilang di dasar */
        }

        /* EFEK AIR CRYSTAL CLEAR */
        .crystal-clear-layer {
            position: absolute;
            top: 30%;
            left: 45%;
            width: 0;
            height: 40%;
            background: linear-gradient(to right, transparent, rgba(0, 242, 255, 0.3));
            z-index: 2;
            transition: width 3s ease-in-out;
            border-radius: 0 50px 50px 0;
        }

        /* FLOW PIPES */
        .pipe-flow { position: absolute; height: 10px; border-radius: 5px; z-index: 5; transition: width 2s ease; }
        .inflow { top: 22%; left: 10%; background: var(--dirty-brown); box-shadow: 0 0 10px var(--dirty-brown); }
        .outflow { bottom: 25%; right: 10%; background: var(--invila-cyan); box-shadow: 0 0 20px var(--invila-cyan); }

        /* DATA BOXES */
        .dashboard-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .data-card { background: #070b14; padding: 15px; border-radius: 12px; border-left: 4px solid var(--invila-cyan); text-align: center; }
        .data-val { font-size: 1.5rem; font-weight: 900; display: block; }
        .data-label { font-size: 0.6rem; color: var(--text-slate); text-transform: uppercase; }

        .guarantee { text-align: center; margin-top: 25px; padding: 15px; border: 1px dashed var(--invila-cyan); color: var(--invila-cyan); font-weight: bold; border-radius: 10px; }
    </style>
</head>
<body>

<div class="hmi-wrapper">
    <header style="text-align: center; margin-bottom: 25px;">
        <h1 style="color:var(--invila-cyan); margin:0;">INVILA™ SMART SYSTEM HMI</h1>
        <span style="color:var(--mbbr-green); font-size: 0.8rem;">● DIGITAL TWIN ACTIVE</span>
    </header>

    <div class="visualizer-area">
        <img class="unit-background" src="invila-unit-technical.png">
        
        <div id="settleZone" class="crystal-clear-layer"></div>
        <div id="particleField"></div>

        <div id="pipeIn" class="pipe-flow inflow" style="width: 0;"></div>
        <div id="pipeOut" class="pipe-flow outflow" style="width: 0;"></div>
    </div>

    <div class="dashboard-grid">
        <div class="data-card">
            <span class="data-label">Influent Turbidity</span>
            <span class="data-val" id="d1">88.1</span><small>NTU</small>
        </div>
        <div class="data-card" style="border-color: #f1c40f;">
            <span class="data-label">Oxy-Pure Boost</span>
            <span class="data-val">890</span><small>kW/h</small>
        </div>
        <div class="data-card" style="border-color: var(--mbbr-green);">
            <span class="data-label">Effluent Quality</span>
            <span class="data-val" id="d2" style="color:var(--mbbr-green)">0.69</span><small>NTU</small>
        </div>
        <div class="data-card">
            <span class="data-label">DECM Stability</span>
            <span class="data-val">99.2</span><small>%</small>
        </div>
    </div>

    <footer style="text-align: center; margin-top: 30px; font-size: 0.7rem; color: #475569;">
        © 2026 INVILA™ ASIA - Water Technology Excellence
    </footer>

    <div class="guarantee">
        "No-Result, No-Pay. Apapun kondisinya, performa air adalah jaminan kami."
    </div>
</div>

<script>
    function runSimulation() {
        const pField = document.getElementById('particleField');
        const clearWater = document.getElementById('settleZone');
        
        // 1. Influent Flow
        document.getElementById('pipeIn').style.width = '12%';

        // 2. Swirling Particles
        for (let i = 0; i < 40; i++) {
            setTimeout(() => {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = (25 + Math.random() * 15) + '%';
                p.style.top = (35 + Math.random() * 20) + '%';
                p.style.animation = `swirlAndSettle ${2 + Math.random() * 2}s forwards`;
                pField.appendChild(p);
            }, i * 80);
        }

        // 3. Settling & Crystal Clear Appearance
        setTimeout(() => {
            clearWater.style.width = '35%';
        }, 3000);

        // 4. Effluent Outflow
        setTimeout(() => {
            document.getElementById('pipeOut').style.width = '12%';
        }, 5000);

        // Dynamic Data
        setInterval(() => {
            document.getElementById('d1').innerText = (85 + Math.random() * 5).toFixed(1);
            document.getElementById('d2').innerText = (0.5 + Math.random() * 0.3).toFixed(2);
        }, 2000);
    }

    window.onload = runSimulation;
</script>

</body>
</html>
